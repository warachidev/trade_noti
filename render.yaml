services:
  - type: web
    name: notitrade-backend
    env: docker
    dockerfilePath: ./Dockerfile.backend
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: PORT
        value: 3001
      - key: CHECK_INTERVAL_MINUTES
        value: 15
    disk:
      name: notitrade-data
      mountPath: /app/data
      sizeGB: 1
